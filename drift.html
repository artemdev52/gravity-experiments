<!DOCTYPE html>
<html>
<head>
<title>Experiment №2</title>
<style>
#centre {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  display: grid;
  grid-template-columns: auto auto auto;
  grid-template-areas:
    ". up ."
    "left title right"
    ". down .";

  align-items: center;
  justify-items: center;
}

.up    { grid-area: up; }
.down  { grid-area: down; }
.left  { grid-area: left; }
.right { grid-area: right; }
#h1    { grid-area: title; }

.horizontal,
.vertical {
  display: none;
  background: none;
  border: none;
  font-size: 100px;
}
#move {
  position: absolute;
  pointer-events: none;
  top: 0px;
  left: 0px;
  background-color: blue;
  border: 2px solid #000099;
  width: 48px;
  height: 48px;
}
#speeds {
  position: fixed;
  top: 10px;
  right: 10px;
}
#toggle {
  position: absolute;
  bottom: 10px;
  right: 10px;
}
#toggleBack {
  position: absolute;
  right: 10px;
  bottom: 10px;
  height: 10px;
  width: 45px;
  background-color: white;
  border: 2px solid #999999;
  border-radius: 7px;
}
#toggleFront {
  position: absolute;
  bottom: 7px;
  left: 3px;
  width: 16px;
  height: 16px;
  border: 2px solid #0000ff;
  border-radius: 50%;
  background-color: #0066ff;
}
#p {
  margin: 5px;
  transform: translate(-5px, -15px);
}
#leftbottom {
  left: 10px;
  bottom: 10px;
  position: absolute;
}
</style>
</head>
<body>
<div id="centre">
  <button onclick="vy--" class="vertical up">▲</button>
  <button onclick="vx++" class="horizontal right">▶</button>
  <h1 id="h1">WASD/arrows to move. Q to pause/resume.</h1>
  <button onclick="vx--" class="horizontal left">◀</button>
  <button onclick="vy++" class="vertical down">▼</button>
</div>
<div id='speeds'>
  <p id='total'>Total velocity: 0 pixels per second  </p>
  <p id='xSpeed'>X component: 0 pixels per second</p>
  <p id='ySpeed'>Y component: 0 pixels per second</p>
</div>
<div id='move'></div>
<div id='toggle'>
  <p id='p'>Teleport</p>
  <button onclick='toggle()' id='toggleBack'></button>
  <button onclick='toggle()' id='toggleFront'></button>
</div>
<div id='leftbottom'>
  <p id='text'>Touch here if on phone or tablet</p>
</div>
<script>
let positionX = 0;
let positionY = 0;
let vx = 0;
let vy = 0;
let vtotal = 0
let a = 0
let pause = false;
let onPhone = false
document.addEventListener(('keydown'), (e) => {
  let key = e.key.toLowerCase();
  if (key === 'arrowup' || key === 'w') {
    vy--;
  };
  if (key === 'arrowdown' || key === 's') {
    vy++;
  };
  if (key === 'arrowleft' || key === 'a') {
    vx--;
  };
  if (key === 'arrowright' || key === 'd') {
    vx++;
  };
  if (key === 'q') {
    pause = !pause;
    if (!pause) {
      start();
    }
  }
})
const div = document.getElementById('move')
let state = 1
function toggle() {
  state = -state;
  if (state === -1) {
    document.getElementById('p').textContent = 'Bounce';
    document.getElementById('toggleFront').style.transform = 'translateX(35px)';
  } else if (state === 1) {
    document.getElementById('p').textContent = 'Teleport'
    document.getElementById('toggleFront').style.transform = 'translateX(0px)';
  }
}
function start() {
  if (!pause) {
    positionX += vx;
    positionY += vy;
    if (state === 1) {
      if (positionX > window.innerWidth-52) {
        positionX = 0;
      } else if (positionX < 0) positionX = window.innerWidth-52;
      if (positionY > window.innerHeight-52) {
        positionY = 0;
      } else if (positionY < 0) positionY = window.innerHeight-52;
    } else if (state === -1) {
      if (positionX > window.innerWidth-52 || positionX < 0) vx = -vx;
      if (positionY > window.innerHeight-52 || positionY < 0) vy = -vy;
    }
    div.style.transform = `translate(${positionX}px, ${positionY}px)`;
    requestAnimationFrame(start);
  };
  a = (vx**2 + vy**2)**(1/2);
  vtotal = Math.round(a*100)/100;
  document.getElementById('xSpeed').textContent = 'X component: '+Math.abs(vx)+' pixels per second';
  document.getElementById('ySpeed').textContent = 'Y component: '+Math.abs(vy)+' pixels per second';
  document.getElementById('total').textContent = 'Total velocity: '+vtotal+' pixels per second  ';
};
start();
function showButtons() {
  if (!onPhone) {
    onPhone = true
    document.querySelectorAll('.horizontal, .vertical')
      .forEach(button => button.style.display = 'block');
    document.getElementById('h1').textContent = 'These buttons to move.'
    document.getElementById('text').textContent = 'Touch here to pause/resume.'
  } else if (onPhone) {
    pause = !pause;
    if (!pause) {
      start();
    }
  }
}
document.getElementById('leftbottom').onclick = function () {
  showButtons();
}
start();
</script>
</body>
</html>
