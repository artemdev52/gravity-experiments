<!DOCTYPE html>
<html>
<head>
<title>Experiment №2</title>
<style>
#centre {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  display: grid;
  grid-template-columns: auto auto auto;
  grid-template-areas:
    ". up ."
    "left title right"
    ". down .";

  align-items: center;
  justify-items: center;
}

.up    { grid-area: up; }
.down  { grid-area: down; }
.left  { grid-area: left; }
.right { grid-area: right; }
#h1    { grid-area: title; }

.horizontal,
.vertical {
  display: none;
  background: none;
  border: none;
  font-size: 100px;
}
#move {
  position: absolute;
  pointer-events: none;
  top: 0px;
  left: 0px;
  background-color: blue;
  border: 2px solid #000099;
  width: 48px;
  height: 48px;
}
#speeds {
  position: fixed;
  top: 10px;
  right: 10px;
}
#toggle {
  position: absolute;
  bottom: 10px;
  right: 10px;
}
.toggleBack {
  height: 10px;
  width: 45px;
  background-color: white;
  border: 2px solid #999999;
  border-radius: 7px;
}
.toggleFront {
  width: 16px;
  height: 16px;
  border: 2px solid #0000ff;
  border-radius: 50%;
  background-color: #0066ff;
}
#toggleFrontWall {
  position: absolute;
  bottom: 7px;
  left: 3px;
}
#toggleBackWall {
  position: absolute;
  left: 8px;
  bottom: 10px;
}
#toggleFrontMode {
  position: absolute;
  left: 3px;
  bottom: 37px;
}
#toggleBackMode {
  position: absolute;
  left: 9px;
  bottom: 40px;
}
#p {
  margin: 5px;
  transform: translate(-5px, -15px);
}
#p2 {
  margin: 5px;
  transform: translate(-5px, -25px);
}
#leftbottom {
  left: 10px;
  bottom: 10px;
  position: absolute;
}
</style>
</head>
<body>
<div id="centre">
  <button onclick="up()" class="vertical up">▲</button>
  <button onclick="right()" class="horizontal right">▶</button>
  <h1 id="h1">WASD/arrows to move. Q to pause/resume.</h1>
  <button onclick="left()" class="horizontal left">◀</button>
  <button onclick="down()" class="vertical down">▼</button>
</div>
<div id='speeds'>
  <p id='total'>Total velocity: 0 pixels per frame  </p>
  <p id='xSpeed'>X component: 0 pixels per frame</p>
  <p id='ySpeed'>Y component: 0 pixels per frame</p>
</div>
<div id='move'></div>
<div id='toggle'>
  <p id='p2'>Speed</p>
  <button id='toggleBackMode' onclick='toggleArrowFunction()' class='toggleBack'></button>
  <button id='toggleFrontMode' onclick='toggleArrowFunction()' class='toggleFront'></button>
  <p id='p'>Teleport</p>
  <button id='toggleBackWall' onclick='toggleWallCollision()' class='toggleBack'></button>
  <button id='toggleFrontWall' onclick='toggleWallCollision()' class='toggleFront'></button>
</div>
<div id='leftbottom'>
  <p id='text'>Touch here if on phone or tablet</p>
</div>
<script>
let positionX = 0;
let positionY = 0;
let vx = 0;
let vy = 0;
let vtotal = 0
let a = 0
let ax = 0
let ay = 0
let pause = false;
let onPhone = false
let stateWall = 1
let stateMode = 1
function up() {
  stateMode === 1 ? vy-- : ay--;
}
function down() {
  stateMode === 1 ? vy++ : ay++;
}
function right() {
  stateMode === 1 ? vx++ : ax++;
}
function left() {
  stateMode === 1 ? vx-- : ax--;
}
document.addEventListener(('keydown'), (e) => {
  let key = e.key.toLowerCase();
  if (key === 'arrowup' || key === 'w') {
    up();
  };
  if (key === 'arrowdown' || key === 's') {
    down();
  };
  if (key === 'arrowleft' || key === 'a') {
    left();
  };
  if (key === 'arrowright' || key === 'd') {
    right();
  };
  if (key === 'q') {
    pause = !pause;
    if (!pause) {
      start();
    }
  }
})
const now = [new Date().getDate(), new Date().getMonth() + 1]
const april_fools = [1, 4]
if (now.join() === april_fools.join()) {
  document.body.style.filter = 'invert(1)';
  document.title = '🫪';
}
const div = document.getElementById('move')
function toggleWallCollision() {
  stateWall = -stateWall;
  if (stateWall === -1) {
    document.getElementById('p').textContent = 'Bounce';
    document.getElementById('toggleFrontWall').style.transform = 'translateX(35px)';
  } else if (stateWall === 1) {
    document.getElementById('p').textContent = 'Teleport'
    document.getElementById('toggleFrontWall').style.transform = 'translateX(0px)';
  }
}
function toggleArrowFunction() {
  stateMode = -stateMode;
  if (stateMode === -1) {
    document.getElementById('p2').textContent = 'Gravity';
    document.getElementById('toggleFrontMode').style.transform = 'translateX(35px)';
  } else if (stateMode === 1) {
    document.getElementById('p2').textContent = 'Speed'
    document.getElementById('toggleFrontMode').style.transform = 'translateX(0px)';
  }
}
function start() {
  if (!pause) {
    vx += ax;
    vy += ay;
    positionX += vx;
    positionY += vy;
    if (stateWall === 1) {
      if (positionX > window.innerWidth-52) {
        positionX = 0;
      } else if (positionX < 0) positionX = window.innerWidth-52;
      if (positionY > window.innerHeight-52) {
        positionY = 0;
      } else if (positionY < 0) positionY = window.innerHeight-52;
    } else if (stateWall === -1) {
      if (positionX > window.innerWidth-52) {
        vx = -vx;
        positionX = window.innerWidth - 52;
      } else if (positionX < 0) {
        vx = -vx;
        positionX = 0;
      }
      if (positionY > window.innerHeight-52) {
        vy = -vy;
        positionY = window.innerHeight - 52;
      } else if (positionY < 0) {
        vy = -vy;
        positionY = 0;
      }
    }
    div.style.transform = `translate(${positionX}px, ${positionY}px)`;
    requestAnimationFrame(start);
  };
  a = (vx**2 + vy**2)**(1/2);
  vtotal = Math.round(a*100)/100;
  document.getElementById('xSpeed').textContent = 'X component: '+Math.abs(vx)+' pixels per frame';
  document.getElementById('ySpeed').textContent = 'Y component: '+Math.abs(vy)+' pixels per frame';
  document.getElementById('total').textContent = 'Total velocity: '+vtotal+' pixels per frame  ';
};
function showButtons() {
  if (!onPhone) {
    onPhone = true
    document.querySelectorAll('.horizontal, .vertical')
      .forEach(button => button.style.display = 'block');
    document.getElementById('h1').textContent = 'These buttons to move.'
    document.getElementById('text').textContent = 'Touch here to pause/resume.'
  } else if (onPhone) {
    pause = !pause;
    if (!pause) {
      start();
    }
  }
}
document.getElementById('leftbottom').onclick = function () {
  showButtons();
}
start();
</script>
</body>
</html>
